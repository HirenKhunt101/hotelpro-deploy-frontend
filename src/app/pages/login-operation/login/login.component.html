<div class="container">
  <img src="assets/images/login-bg1.jpg" class="cc" alt="" />
  <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-lg-4 col-md-6 col-sm-12 p-3 login-card">
      <div class="fs-2 fw-bold">Sign in</div>

      <form [formGroup]="LoginForm" (ngSubmit)="logIn()" class="mt-3">
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Email </label>
          <input type="text" class="form-control glass-input" formControlName="email" id="exampleInputEmail1"
            aria-describedby="emailHelp" placeholder="you@example.com" />
          <div *ngIf="
              LoginForm.controls['email'].invalid &&
              (LoginForm.controls['email'].dirty ||
                LoginForm.controls['email'].touched)
            ">
            <div class="text-danger" *ngIf="LoginForm.controls['email'].errors?.['required']">
              Email is required.
            </div>
          </div>
        </div>
        <div class="mb-3">
          <div class="d-flex justify-content-between">
            <div>
              <label for="exampleInputPassword1" class="form-label">Password</label>
            </div>
            <div><a routerLink="/forgotpassword" class="glass-link">Forgot Password</a></div>
          </div>
          <div class="input-container">
            <input #passwordInput type="password" class="form-control glass-input" id="exampleInputPassword1"
              formControlName="password" placeholder="Enter Password" />
            <div class="eye-icon" (click)="
                passwordInput.type =
                  passwordInput.type === 'password' ? 'text' : 'password'
              ">
              <div *ngIf="passwordInput.type === 'text'" class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#355685" class="bi bi-eye-fill"
                  viewBox="0 0 16 16">
                  <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0" />
                  <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7" />
                </svg>
              </div>

              <div *ngIf="passwordInput.type === 'password'" class="sicon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#355685" class="bi bi-eye-slash"
                  viewBox="0 0 16 16">
                  <path
                    d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z" />
                  <path
                    d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829" />
                  <path
                    d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z" />
                </svg>
              </div>
            </div>
          </div>

          <div *ngIf="
              LoginForm.controls['password'].invalid &&
              (LoginForm.controls['password'].dirty ||
                LoginForm.controls['password'].touched)
            ">
            <div class="text-danger" *ngIf="LoginForm.controls['password'].errors?.['required']">
              Password is required.
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary glass-button" [disabled]="LoginForm.invalid">
          Login
        </button>
      </form>
      <div class="line-with-text mt-2">
        <span class="line-text">OR</span>
      </div>
      <br />
      <div class="">
        Doesn't have an account yet?
        <a routerLink="/registeruser" class="glass-link">Sign Up</a>
      </div>
    </div>
  </div>
</div>
